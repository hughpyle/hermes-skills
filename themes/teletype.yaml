name: teletype
label: Teletype
description: ASR-33 paper roll with ink-on-beige and Teletype33 font.
palette:
  background:
    hex: "#FFEEDD"
    alpha: 1.0
  midground:
    hex: "#333333"
    alpha: 1.0
  foreground:
    hex: "#000000"
    alpha: 0.0
  warmGlow: "rgba(120, 90, 60, 0.15)"
  noiseOpacity: 0.4
typography:
  fontSans: 'system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
  fontMono: '"Teletype33", monospace'
  fontDisplay: 'system-ui, -apple-system, "Segoe UI", Roboto, sans-serif'
  fontUrl: "/dashboard-plugins/teletype/dist/fonts/teleprinter.css"
  baseSize: "16px"
  lineHeight: "1.4"
  letterSpacing: "0"
layout:
  radius: "0"
  density: "comfortable"
layoutVariant: standard
assets:
  bg: "/dashboard-plugins/teletype/dist/img/paper.png"
componentStyles:
  page:
    background-color: "#FFEEDD"
    color: "#333333"
  card:
    background-color: "#FFEEDD"
    border: "1px solid #d4c4a4"
    box-shadow: "none"
customCSS: |
  /* paper texture scrolls with the page (background-attachment: local),
     so as the paper roll grows the grain moves in lockstep with page motion. */
  body {
    background-image: var(--theme-asset-bg);
    background-repeat: repeat;
  }
  /* drop the gradient backdrop the standard layout adds */
  [data-layout-variant="standard"] .backdrop { display: none; }

  /* Force Teletype33 onto every element that already wants a monospace
     glyph set. The dashboard's default rules are more specific than the
     theme's fontMono variable in many places (cron, code blocks, form
     fields), so we override here. !important is intentional. */
  input, textarea, select, button,
  [role="combobox"], [role="listbox"], [role="textbox"], [role="option"],
  [contenteditable="true"], [contenteditable=""],
  code, pre, kbd, samp, tt,
  .font-mono, .font-monospace,
  [class*="monospace"], [class*="mono-"] {
    font-family: "Teletype33", "Courier New", monospace !important;
  }

  /* Left navigation: anything inside the sidebar / nav landmark, plus
     shadcn's data-sidebar slot. */
  nav, aside,
  [role="navigation"],
  [data-sidebar], [data-slot="sidebar"],
  [class*="sidebar"], [class*="Sidebar"],
  nav *, aside *,
  [role="navigation"] *,
  [data-sidebar] *, [data-slot="sidebar"] *,
  [class*="sidebar"] *, [class*="Sidebar"] * {
    font-family: "Teletype33", monospace !important;
  }

  /* Page headers and section titles. */
  h1, h2, h3, h4, h5, h6,
  [role="heading"],
  [class*="page-header"], [class*="PageHeader"],
  [class*="page-title"], [class*="PageTitle"],
  [data-slot="title"], [data-slot="header"] {
    font-family: "Teletype33", monospace !important;
  }
